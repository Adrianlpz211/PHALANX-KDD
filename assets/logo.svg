<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250" role="img" aria-label="Agentix KDD">
  <defs>
    <linearGradient id="sil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#AEBAC8"/>
    </linearGradient>
    <radialGradient id="bgglow" cx="50%" cy="44%" r="58%">
      <stop offset="0" stop-color="#0F2630"/>
      <stop offset="100%" stop-color="#080B11"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="700" height="250" rx="26" fill="url(#bgglow)"/>
  <rect x="1.5" y="1.5" width="697" height="247" rx="25" fill="none" stroke="#1E2A38" stroke-width="1.5"/>

  <!-- Reactor-A en el slot 0 (centro x=128) — la "A" de AGENTIX -->
  <g transform="translate(83,85) scale(0.9)">
    <path d="M16 89 L50 12 L84 89" fill="none" stroke="url(#sil)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 34 L63 61 L37 61 Z" fill="none" stroke="#3FE2E8" stroke-width="3.4" stroke-dasharray="2 3.6" stroke-linejoin="round" filter="url(#glow)"/>
    <line x1="33" y1="63" x2="67" y2="63" stroke="#3FE2E8" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="50" cy="63" r="6" fill="#EAFEFF" filter="url(#glow)"/>
  </g>

  <!-- GENTI en titanio (slots 1-5) -->
  <g font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" fill="url(#sil)" text-anchor="middle">
    <text x="202" y="165">G</text>
    <text x="276" y="165">E</text>
    <text x="350" y="165">N</text>
    <text x="424" y="165">T</text>
    <text x="498" y="165">I</text>
  </g>

  <!-- X en cian = la variable ("cualquier IDE la usa") (slot 6) -->
  <text x="572" y="165" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" fill="#3FE2E8" text-anchor="middle" filter="url(#glow)">X</text>

  <!-- KDD tag -->
  <g transform="translate(350,210)">
    <line x1="-86" y1="0" x2="-58" y2="0" stroke="#7E6228" stroke-width="1.5"/>
    <line x1="58" y1="0" x2="86" y2="0" stroke="#7E6228" stroke-width="1.5"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="11" fill="#D9A33C" text-anchor="middle">KDD</text>
  </g>
</svg>
